<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0B0F19" />
      <stop offset="50%" stop-color="#111827" />
      <stop offset="100%" stop-color="#070A10" />
    </linearGradient>

    <!-- Accent Gradient Cyan-Blue -->
    <linearGradient id="accent-cyan" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00F2FE" />
      <stop offset="100%" stop-color="#4FACFE" />
    </linearGradient>

    <!-- Grid Pattern -->
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1F293D" stroke-width="0.8" opacity="0.4"/>
    </pattern>

    <!-- Glow Filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)" />
  <rect width="1200" height="630" fill="url(#grid)" />

  <!-- Ambient Glows -->
  <circle cx="1000" cy="150" r="250" fill="#4FACFE" opacity="0.08" filter="url(#glow)" />
  <circle cx="200" cy="500" r="300" fill="#7F00FF" opacity="0.06" filter="url(#glow)" />

  <!-- Decorative Chart Background -->
  <g opacity="0.25" transform="translate(600, 160)">
    <path d="M 0 250 Q 80 200, 150 220 T 300 120 T 420 80 T 520 20" fill="none" stroke="url(#accent-cyan)" stroke-width="4" filter="url(#glow)"/>
    <path d="M 0 250 Q 80 200, 150 220 T 300 120 T 420 80 T 520 20 L 520 320 L 0 320 Z" fill="url(#accent-cyan)" opacity="0.08" />
  </g>

  <!-- Top Badge -->
  <g transform="translate(100, 110)">
    <rect x="0" y="0" width="280" height="36" rx="18" fill="#1E293B" stroke="#334155" stroke-width="1.5" />
    <circle cx="20" cy="18" r="6" fill="#00F2FE" filter="url(#glow)" />
    <text x="36" y="23" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="13" font-weight="700" fill="#94A3B8" letter-spacing="1.5">FINANCIAL MACHINE LEARNING</text>
  </g>

  <!-- Title & Subtitle -->
  <text x="100" y="215" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="52" font-weight="800" fill="#FFFFFF" letter-spacing="-0.5">
    Deep Learning for Finance
  </text>
  <text x="100" y="268" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="24" font-weight="400" fill="#00F2FE" letter-spacing="0.5">
    Data Leakage, Overfitting &amp; Walk-Forward Validation
  </text>

  <!-- Project Highlights -->
  <g transform="translate(100, 325)">
    <text x="0" y="0" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="16" fill="#94A3B8">
      • Models: <tspan fill="#F8FAFC" font-weight="600">MLP | LSTM | CNN (Gramian Angular Field)</tspan>
    </text>
    <text x="0" y="32" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="16" fill="#94A3B8">
      • Asset Class: <tspan fill="#F8FAFC" font-weight="600">Bitcoin (BTC-USD) Daily Returns</tspan>
    </text>
    <text x="0" y="64" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="16" fill="#94A3B8">
      • Key Objective: <tspan fill="#F8FAFC" font-weight="600">Mitigating Look-Ahead Bias in Trading Strategies</tspan>
    </text>
  </g>

  <!-- Divider Line -->
  <line x1="100" y1="460" x2="1100" y2="460" stroke="#334155" stroke-width="1" />

  <!-- Author Badge -->
  <g transform="translate(100, 500)">
    <text x="0" y="20" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="14" font-weight="600" fill="#64748B" letter-spacing="1">PROJECT AUTHOR</text>
    <text x="0" y="48" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="22" font-weight="700" fill="#FFFFFF">Sana Ur Rehman</text>
  </g>

  <!-- GitHub Link -->
  <g transform="translate(700, 500)">
    <text x="0" y="20" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="14" font-weight="600" fill="#64748B" letter-spacing="1">GITHUB REPOSITORY</text>
    <text x="0" y="48" font-family="'Segoe UI', Roboto, Helvetica, sans-serif" font-size="20" font-weight="600" fill="#00F2FE">github.com/Sanaurrehmanarain</text>
  </g>
</svg>
